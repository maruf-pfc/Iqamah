# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal

    - name: Trigger Coolify Deploy Webhook
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        if [ -n "${{ secrets.COOLIFY_WEBHOOK_URL }}" ]; then
          echo "Triggering Coolify deploy webhook..."
          curl -i -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}"
        else
          echo "Warning: COOLIFY_WEBHOOK_URL secret is not set, skipping deployment step."
        fi
