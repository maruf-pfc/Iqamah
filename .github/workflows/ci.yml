name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  client-validate:
    name: Validate Frontend (Vue)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
    - uses: actions/checkout@v4
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    - name: Install dependencies
      run: bun install --frozen-lockfile
    - name: Type Check
      run: bun run type-check
    - name: Lint
      run: bun run lint
    - name: Run Unit Tests
      run: bun run test:unit -- --run

  server-validate:
    name: Validate Backend (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal

  mobile-validate-and-build:
    name: Validate and Build Mobile (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Run Unit & Widget Tests
      run: flutter test

    - name: Build Universal APK
      run: flutter build apk

    - name: Build Split APKs (per ABI)
      run: flutter build apk --split-per-abi

    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: iqamah-apks
        path: mobile/build/app/outputs/flutter-apk/*.apk

    - name: Create Git Tag for Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        TAG="mobile-$(date +'%Y%m%d-%H%M%S')"
        echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "$TAG"
        git push origin "$TAG"
      working-directory: ${{ github.workspace }}

    - name: Create GitHub Release with APKs
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: "Iqamah Mobile — ${{ env.RELEASE_TAG }}"
        body: |
          🕌 **Iqamah Mobile App — Automated Build**

          Built from `main` branch commit `${{ github.sha }}`.

          ### Downloads
          - **`app-release.apk`** — Universal APK (all devices)
          - **`app-arm64-v8a-release.apk`** — ARM64 (most modern phones)
          - **`app-armeabi-v7a-release.apk`** — ARM32 (older devices)
          - **`app-x86_64-release.apk`** — x86_64 (emulators)

          ### Features
          - Salah Time with offline Adhan calculations (Karachi method)
          - Location-based prayer times & forbidden zone alerts
          - Hayd / Nifas logging (female users only)
          - Prayer log, Qaza tracking, Analytics
        draft: false
        prerelease: false
        files: mobile/build/app/outputs/flutter-apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Coolify
    needs: [client-validate, server-validate, mobile-validate-and-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Trigger Coolify Webhook
      run: |
        if [ -n "${{ secrets.COOLIFY_WEBHOOK_URL }}" ]; then
          echo "Triggering Coolify deploy webhook..."
          curl -i -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}"
        else
          echo "Warning: COOLIFY_WEBHOOK_URL secret is not set, skipping deployment step."
        fi
